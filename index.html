<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pika room ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════════════
   PHOTOS CONFIG — edit nama file fotomu di sini
   Taruh file di folder photos/
   ══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   MUSIC CONFIG — edit di bagian script bawah
   ══════════════════════════════════════════ */

:root {
  --bg: #0d0b10;
  --warm: #e8874a;
  --warm2: #f4a96a;
  --pink: #e8b4c8;
  --pink2: #f2d0e0;
  --surface: #211d28;
  --text: #f0ebe8;
  --muted: #9b8fa0;
  --lamp-on: 1;
}
:root.lights-off {
  --bg: #06050a;
  --surface: #0e0c14;
  --lamp-on: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.8s ease;
}

/* ── ROOM ── */
.room-scene {
  position: relative;
  width: min(900px, 100vw);
  margin: 0 auto;
  height: 100vh;
  min-height: 620px;
  overflow: hidden;
}
.wall {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #1a1520 0%, #141018 55%, #0f0c14 100%);
}
.ambient-lamp {
  position: absolute;
  top: 30%; right: 18%;
  width: 320px; height: 280px;
  background: radial-gradient(ellipse, rgba(232,135,74,0.22) 0%, transparent 72%);
  pointer-events: none;
  transition: opacity 1s ease;
  opacity: var(--lamp-on);
  z-index: 1;
}
.ambient-led {
  position: absolute; top: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(rgba(232,180,200,0.15), transparent);
  pointer-events: none; z-index: 1;
}
.floor-shadow {
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(transparent, rgba(0,0,0,0.5));
  pointer-events: none; z-index: 1;
}

/* ── LED STRIP ── */
.led-strip {
  position: absolute; top: 0; left: 5%; right: 5%; height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--warm) 50%, var(--pink) 100%);
  box-shadow: 0 0 24px 8px rgba(232,180,200,0.4), 0 0 60px 20px rgba(232,180,200,0.12);
  z-index: 10;
  animation: ledPulse 4s ease-in-out infinite;
}
@keyframes ledPulse { 0%,100%{opacity:1}50%{opacity:0.75} }

/* ── WINDOW ── */
.window {
  position: absolute; top: 6%; left: 5%; width: 26%; aspect-ratio: 0.75;
  border-radius: 3px; overflow: hidden; cursor: pointer; z-index: 5;
  border: 2px solid #2e2640;
  box-shadow: inset 0 0 30px rgba(0,0,0,.4), 0 0 0 4px #201c2a, 0 4px 30px rgba(0,0,0,.6);
  transition: box-shadow .3s;
}
.window:hover { box-shadow: inset 0 0 30px rgba(0,0,0,.4), 0 0 0 4px #201c2a, 0 4px 30px rgba(0,0,0,.6), 0 0 20px rgba(100,120,200,0.2); }
.window canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.window-frame-h { position: absolute; left:0;right:0;top:50%;height:3px;background:#2e2640;z-index:3; }
.window-frame-v { position: absolute; top:0;bottom:0;left:50%;width:3px;background:#2e2640;z-index:3; }
.window-state-label { position:absolute;bottom:4px;left:6px;font-size:9px;color:rgba(255,255,255,.35);z-index:4;letter-spacing:.06em;text-transform:uppercase; }

/* ── PHOTOS WALL ── */
.photos-wall { position:absolute;top:5%;left:34%;display:flex;gap:10px;z-index:5; }
.photo { cursor:pointer;position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1); transform-origin:bottom center; }
.photo:nth-child(1){transform:rotate(-4deg)}
.photo:nth-child(2){transform:rotate(2deg) translateY(-6px)}
.photo:nth-child(3){transform:rotate(-2deg) translateY(4px)}
.photo:hover{transform:rotate(0deg) translateY(-8px) scale(1.08)!important;z-index:20}
.photo-inner {
  width:76px;height:90px;background:#f5f0ec;border-radius:2px;
  padding:5px 5px 18px;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.photo-inner img { width:100%;height:100%;object-fit:cover;border-radius:1px; }
.photo-inner .placeholder-img { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,#2a1828,#3d2848); }
.photo-pin { position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:var(--warm);border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4); }

/* ── SHELF ── */
.shelf { position:absolute;top:36%;left:34%;width:40%;z-index:5; }
.shelf-board { height:8px;background:linear-gradient(180deg,#3a3045,#2a2238);border-radius:2px;box-shadow:0 4px 12px rgba(0,0,0,.5);margin-bottom:12px; }
.shelf-items { display:flex;align-items:flex-end;gap:10px;padding:0 8px;height:60px; }

/* ── BED ── */
.bed-area { position:absolute;bottom:8%;left:3%;width:44%;z-index:4; }

/* ── DESK ── */
.desk-area { position:absolute;bottom:8%;right:3%;width:46%;z-index:5; }
.desk-surface { height:10px;background:linear-gradient(180deg,#3d3450,#2e2740);border-radius:3px 3px 0 0;box-shadow:0 -2px 10px rgba(0,0,0,.3); }
.desk-legs { display:flex;justify-content:space-between;padding:0 12px;height:30px; }
.desk-leg { width:8px;background:linear-gradient(180deg,#2e2740,#1f1a2e);border-radius:0 0 2px 2px; }
.desk-items { position:absolute;bottom:10px;left:0;right:0;display:flex;align-items:flex-end;gap:10px;padding:0 16px; }

/* ── LAPTOP ── */
.laptop { cursor:pointer;position:relative;flex-shrink:0;transition:transform .3s; }
.laptop:hover{transform:scale(1.04)}
.laptop-base{width:110px;height:10px;background:linear-gradient(180deg,#3a3a4a,#252535);border-radius:2px 2px 0 0}
.laptop-screen{width:110px;height:68px;background:linear-gradient(135deg,#0a0818,#12102a);border:2px solid #3a3a4a;border-bottom:none;border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 0 20px rgba(100,80,200,.3) inset}
.laptop-glow{position:absolute;inset:0;background:linear-gradient(135deg,rgba(100,80,200,.15),rgba(60,40,160,.1));animation:screenPulse 3s ease-in-out infinite}
@keyframes screenPulse{0%,100%{opacity:1}50%{opacity:.6}}
.laptop-text{font-family:'Cormorant Garamond',serif;font-size:10px;color:rgba(180,160,255,.7);text-align:center;z-index:2;pointer-events:none}

/* ── LAMP ── */
.lamp{cursor:pointer;position:absolute;right:18%;top:20%;z-index:6;transition:transform .3s}
.lamp:hover{transform:scale(1.05)}
.lamp-head{width:40px;height:24px;background:linear-gradient(180deg,#3d3450,#2e2740);border-radius:4px 4px 12px 12px;margin:0 auto;position:relative;overflow:hidden}
.lamp-glow-inner{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:26px;height:12px;background:radial-gradient(ellipse,rgba(232,200,120,.9),transparent 80%);transition:opacity 1s;opacity:var(--lamp-on)}
.lamp-neck{width:3px;height:50px;background:#2e2740;margin:0 auto}
.lamp-base-el{width:26px;height:6px;background:#2e2740;border-radius:3px;margin:0 auto}
.lamp-cone{position:absolute;top:32px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:60px solid transparent;border-right:60px solid transparent;border-top:100px solid rgba(232,180,80,.08);pointer-events:none;transition:opacity 1s;opacity:var(--lamp-on);z-index:-1}

/* ── PLUSH ── */
.plush{cursor:pointer;position:absolute;bottom:42%;left:6%;z-index:6;transition:transform .3s cubic-bezier(.34,1.56,.64,1);animation:plushFloat 4s ease-in-out infinite}
.plush:hover{transform:scale(1.12) rotate(-5deg)!important;animation:none}
@keyframes plushFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── PLANT ── */
.plant-large{position:absolute;bottom:8%;left:76%;z-index:3;animation:plantSway 6s ease-in-out infinite;transform-origin:bottom center}
@keyframes plantSway{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1.5deg)}}

/* ── GLASSMORPHISM MODALS ── */
.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  z-index:100;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.glass-panel {
  background:rgba(30,24,40,.88);backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:28px 32px;max-width:440px;width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 0.5px rgba(255,255,255,.05);
  transform:scale(.92) translateY(10px);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;position:relative;
}
.modal-overlay.open .glass-panel{transform:scale(1) translateY(0);opacity:1}
.panel-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.08);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
.panel-close:hover{background:rgba(255,255,255,.15);color:var(--text)}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text);margin-bottom:6px;letter-spacing:.03em}
.panel-sub{font-size:12px;color:var(--muted);margin-bottom:14px;letter-spacing:.06em;text-transform:uppercase}

/* ── GALLERY ── */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.gallery-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;background:#1a1525}
.gallery-item:hover{transform:scale(1.04);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-item .no-photo{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:rgba(255,255,255,.12);font-size:11px;letter-spacing:.04em}
.gallery-item .no-photo span{font-size:20px}

/* ── LIGHTBOX ── */
#lightbox{display:none;position:absolute;inset:0;background:rgba(0,0,0,.9);border-radius:20px;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:10}
#lightboxImg{max-width:86%;max-height:68%;border-radius:10px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.lb-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);color:var(--muted);padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:background .2s,color .2s}
.lb-close:hover{background:rgba(255,255,255,.18);color:var(--text)}

/* ── MUSIC PLAYER ── */
.track-display{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.track-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.track-artist{font-size:12px;color:var(--muted);margin-top:2px}
.progress-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:12px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--warm),var(--pink));border-radius:2px;width:0%;transition:width .1s linear}
.player-controls{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:16px}
.ctrl-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color .2s,transform .2s;padding:6px}
.ctrl-btn:hover{color:var(--text);transform:scale(1.15)}
.ctrl-btn.play{width:42px;height:42px;background:linear-gradient(135deg,var(--warm),var(--pink));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.ctrl-btn.play:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(232,135,74,.4)}
.tracklist{margin-top:14px;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
.tracklist::-webkit-scrollbar{width:3px}
.tracklist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.track-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .2s;font-size:13px;color:var(--muted)}
.track-item:hover,.track-item.active{background:rgba(255,255,255,.05);color:var(--text)}
.track-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;transition:background .2s}
.track-item.active .track-dot{background:var(--warm)}
.track-dur{margin-left:auto;font-size:11px;opacity:.5}
.vol-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding:0 2px}
.vol-row label{font-size:11px;color:var(--muted);letter-spacing:.04em}
.vol-row input[type=range]{flex:1;accent-color:var(--warm);height:3px;cursor:pointer}

/* ── PLUSH MODAL ── */
.message-bubble{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px 16px 16px 4px;padding:14px 18px;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;font-style:italic;color:var(--text);line-height:1.5;margin-bottom:14px;position:relative}
.message-bubble::before{content:'✦';position:absolute;top:-10px;left:16px;font-size:12px;color:var(--pink);font-style:normal}
.next-msg-btn{display:block;width:100%;background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:8px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;letter-spacing:.05em;transition:border-color .2s,color .2s,background .2s}
.next-msg-btn:hover{border-color:var(--pink);color:var(--pink);background:rgba(232,180,200,.05)}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,24,40,.9);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── TOOLTIP ── */
.hover-tip{position:fixed;background:rgba(20,15,28,.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.07);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px;pointer-events:none;z-index:300;opacity:0;transition:opacity .15s;letter-spacing:.04em}

/* ── EASTER EGG ── */
.star-hidden{position:absolute;bottom:30%;right:2%;width:14px;height:14px;opacity:.08;cursor:pointer;z-index:6;transition:opacity .3s;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--pink)}
.star-hidden:hover{opacity:.5}

/* ── CANDLE ── */
.candle{animation:flicker 2.5s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:1}45%{opacity:.8}50%{opacity:1}70%{opacity:.9}}

/* ── ENTRY ANIMATION ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.room-scene > *{animation:fadeInUp .8s ease both}
.room-scene > *:nth-child(1){animation-delay:.1s}
.room-scene > *:nth-child(2){animation-delay:.2s}
.room-scene > *:nth-child(3){animation-delay:.3s}
.room-scene > *:nth-child(4){animation-delay:.35s}
.room-scene > *:nth-child(5){animation-delay:.4s}
.room-scene > *:nth-child(6){animation-delay:.45s}

/* ── INTRO ── */
.intro{position:fixed;inset:0;background:#06050a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:opacity .8s}
.intro.hidden{opacity:0;pointer-events:none}
.intro-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:rgba(240,235,232,.9);letter-spacing:.08em}
.intro-sub{font-size:12px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.intro-dot{width:6px;height:6px;background:var(--warm);border-radius:50%;margin-top:6px;box-shadow:0 0 16px 6px rgba(232,135,74,.5);animation:pulse 2s ease-in-out infinite}

@media(max-width:600px){
  .photos-wall{top:4%;left:32%;gap:6px}
  .photo-inner{width:56px;height:68px}
  .shelf{top:34%;left:32%;width:44%}
  .lamp{right:14%;top:18%}
  .desk-area{width:50%;right:1%}
  .bed-area{width:48%;left:1%}
  .plush{bottom:40%;left:3%}
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="intro-title">pika room ✦</div>
  <div class="intro-sub">tap to enter</div>
  <div class="intro-dot"></div>
</div>

<!-- MAIN SCENE -->
<div class="room-scene">
  <div class="wall"></div>
  <div class="ambient-led"></div>
  <div class="ambient-lamp"></div>
  <div class="floor-shadow"></div>
  <div class="led-strip"></div>

  <!-- WINDOW -->
  <div class="window" id="windowEl" data-tip="click to change weather">
    <canvas id="windowCanvas"></canvas>
    <div class="window-frame-h"></div>
    <div class="window-frame-v"></div>
    <div class="window-state-label" id="windowLabel">rainy night</div>
  </div>

  <!-- PHOTOS ON WALL -->
  <div class="photos-wall" id="photosEl" data-tip="open gallery">
    <div class="photo" data-idx="0">
      <div class="photo-pin"></div>
      <div class="photo-inner" id="wall0"><div class="placeholder-img">✦</div></div>
    </div>
    <div class="photo" data-idx="1">
      <div class="photo-pin"></div>
      <div class="photo-inner" id="wall1"><div class="placeholder-img">✦</div></div>
    </div>
    <div class="photo" data-idx="2">
      <div class="photo-pin"></div>
      <div class="photo-inner" id="wall2"><div class="placeholder-img">✦</div></div>
    </div>
  </div>

  <!-- SHELF -->
  <div class="shelf">
    <div class="shelf-items">
      <svg width="28" height="56" viewBox="0 0 28 56" fill="none">
        <rect x="11" y="40" width="6" height="14" rx="2" fill="#2e2740"/>
        <ellipse cx="14" cy="38" rx="5" ry="8" fill="#2d5a3d" opacity=".9"/>
        <ellipse cx="9" cy="33" rx="4" ry="6" fill="#3a7a50" transform="rotate(-20 9 33)" opacity=".8"/>
        <ellipse cx="19" cy="31" rx="4" ry="6" fill="#3a7a50" transform="rotate(20 19 31)" opacity=".8"/>
        <ellipse cx="14" cy="28" rx="4" ry="7" fill="#4a9465"/>
      </svg>
      <svg width="22" height="40" viewBox="0 0 22 40" fill="none">
        <rect x="2" y="28" width="18" height="10" rx="1" fill="#c87a6a"/>
        <rect x="3" y="18" width="16" height="10" rx="1" fill="#7a9acd"/>
        <rect x="4" y="10" width="14" height="8" rx="1" fill="#9a7abc"/>
        <rect x="5" y="4" width="12" height="6" rx="1" fill="#d4a574"/>
      </svg>
      <svg width="28" height="50" viewBox="0 0 28 50" fill="none">
        <rect x="6" y="14" width="16" height="28" rx="4" fill="rgba(180,200,255,.12)" stroke="rgba(180,200,255,.25)" stroke-width="1"/>
        <rect x="8" y="10" width="12" height="5" rx="2" fill="rgba(180,200,255,.2)"/>
        <text x="14" y="32" text-anchor="middle" font-size="8" fill="rgba(255,230,180,.7)">★</text>
        <text x="10" y="26" text-anchor="middle" font-size="6" fill="rgba(255,230,180,.5)">✦</text>
        <text x="18" y="37" text-anchor="middle" font-size="6" fill="rgba(255,230,180,.5)">✦</text>
      </svg>
      <svg width="16" height="44" viewBox="0 0 16 44" fill="none" class="candle">
        <rect x="4" y="18" width="8" height="24" rx="2" fill="#d4b896"/>
        <ellipse cx="8" cy="18" rx="4" ry="2" fill="#c9a87a"/>
        <line x1="8" y1="18" x2="8" y2="12" stroke="#6b5740" stroke-width="1.5"/>
        <ellipse cx="8" cy="10" rx="3" ry="5" fill="rgba(255,180,60,.85)"/>
        <ellipse cx="8" cy="8" rx="1.5" ry="3" fill="rgba(255,220,120,.9)"/>
        <ellipse cx="8" cy="6" rx=".8" ry="2" fill="#fff" opacity=".8"/>
      </svg>

<script>
/* ══════════════════════════════════════════════════════════
   📸  PHOTOS CONFIG
   Taruh foto di folder photos/ lalu tulis nama filenya di sini.
   Maksimal 6 foto. Bisa jpg, jpeg, png, webp.
   ══════════════════════════════════════════════════════════ */
const PHOTOS = [
  'photos/foto1.jpg',
  'photos/foto2.jpg',
  'photos/foto3.jpg',
  'photos/foto4.jpg',
  'photos/foto5.jpg',
  'photos/foto6.jpg',
];

/* ══════════════════════════════════════════════════════════
   🎵  MUSIC CONFIG
   Taruh file mp3 di folder music/ lalu isi data di sini.
   Format: { file: 'nama-file.mp3', name: 'Judul Lagu', artist: 'Artis' }
   ══════════════════════════════════════════════════════════ */
const TRACKS = [
  { file: 'music/sempurna.mp3', name: 'Sempurna', artist: 'Andra & The Backbone' },
  { file: 'music/perfect.mp3', name: 'Perfect', artist: 'Ed Sheeran' },
  { file: 'music/monolog.mp3', name: 'Monolog', artist: 'Pamungkas' },
  { file: 'music/debu.mp3', name: 'Sampai Jadi Debu', artist: 'Banda Naira' }
];

/* ══ END CONFIG — jangan ubah di bawah ini ══ */

/* ── INTRO ── */
document.getElementById('intro').addEventListener('click', () => {
  document.getElementById('intro').classList.add('hidden');
  setTimeout(() => document.getElementById('intro').remove(), 1000);
  initRoom();
});

function initRoom() {
  drawWindow(); startRain();
  loadPhotos();
  buildTracklist();
  buildGallery();
  attachEvents();
}

/* ── WINDOW WEATHER ── */
const weatherStates = ['rainy night','foggy dawn','starry night','golden dusk'];
let weatherIdx = 0;

function drawWindow() {
  const canvas = document.getElementById('windowCanvas');
  const w = canvas.offsetWidth || 200, h = canvas.offsetHeight || 260;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  document.getElementById('windowLabel').textContent = weatherStates[weatherIdx];
  const fn = [drawRainyCity, drawFoggyDawn, drawStarryNight, drawGoldenDusk][weatherIdx];
  fn(ctx, w, h);
}

function drawRainyCity(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#0a0820');g.addColorStop(1,'#1a1030');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  [[0,.5,.14],[.12,.35,.11],[.22,.55,.15],[.36,.42,.12],[.47,.38,.10],[.56,.5,.14],[.68,.4,.13],[.8,.52,.11],[.9,.44,.10]].forEach(([x,yf,wd])=>{
    ctx.fillStyle='#12102a';ctx.fillRect(x*w,yf*h,wd*w,(1-yf)*h);
    for(let wx=x*w+4;wx<(x+wd)*w-4;wx+=8)for(let wy=yf*h+4;wy<h-4;wy+=10)
      if(Math.random()>.55){ctx.fillStyle=`rgba(255,220,150,${Math.random()*.5+.1})`;ctx.fillRect(wx,wy,4,5);}
  });
  ctx.fillStyle='rgba(220,210,255,.7)';ctx.beginPath();ctx.arc(w*.8,h*.12,h*.06,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(10,8,32,.9)';ctx.beginPath();ctx.arc(w*.83,h*.1,h*.055,0,Math.PI*2);ctx.fill();
}
function drawFoggyDawn(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#2a1828');g.addColorStop(.5,'#5a2838');g.addColorStop(1,'#8a4848');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(255,200,150,.15)';ctx.beginPath();ctx.arc(w/2,h*.4,h*.25,0,Math.PI*2);ctx.fill();
  [[0,.6,.18],[.3,.65,.2],[.6,.58,.16],[.82,.62,.15]].forEach(([x,yf,wd])=>{ctx.fillStyle='rgba(30,15,25,.7)';ctx.fillRect(x*w,yf*h,wd*w,(1-yf)*h);});
}
function drawStarryNight(ctx,w,h){
  ctx.fillStyle='#04020e';ctx.fillRect(0,0,w,h);
  for(let i=0;i<80;i++){const sx=Math.random()*w,sy=Math.random()*h*.7,sr=Math.random()*1.2;ctx.fillStyle=`rgba(255,255,255,${.3+Math.random()*.7})`;ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();}
  [[0,.5,.18],[.22,.45,.12],[.4,.55,.16],[.62,.48,.14],[.78,.52,.13]].forEach(([x,yf,wd])=>{ctx.fillStyle='#060412';ctx.fillRect(x*w,yf*h,wd*w,(1-yf)*h);});
}
function drawGoldenDusk(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#1a0810');g.addColorStop(.3,'#5a2010');g.addColorStop(.6,'#c05020');g.addColorStop(1,'#f09040');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(255,180,60,.6)';ctx.beginPath();ctx.arc(w/2,h*.55,h*.18,0,Math.PI*2);ctx.fill();
  [[0,.52,.2],[.25,.56,.16],[.44,.5,.18],[.66,.54,.14],[.82,.52,.15]].forEach(([x,yf,wd])=>{ctx.fillStyle='rgba(10,5,20,.85)';ctx.fillRect(x*w,yf*h,wd*w,(1-yf)*h);});
}

let rainDrops=[];
function startRain(){
  const c=document.getElementById('windowCanvas');
  rainDrops=Array.from({length:20},()=>({x:Math.random(),y:Math.random(),speed:.008+Math.random()*.01,len:.03+Math.random()*.04}));
  animateRain();
}
function animateRain(){
  if(weatherStates[weatherIdx]!=='rainy night'){requestAnimationFrame(animateRain);return;}
  const c=document.getElementById('windowCanvas'),w=c.width,h=c.height,ctx=c.getContext('2d');
  drawRainyCity(ctx,w,h);
  ctx.strokeStyle='rgba(180,200,255,.35)';ctx.lineWidth=.8;
  rainDrops.forEach(d=>{d.y+=d.speed;if(d.y>1){d.y=0;d.x=Math.random();}ctx.beginPath();ctx.moveTo(d.x*w,d.y*h);ctx.lineTo(d.x*w-2,(d.y+d.len)*h);ctx.stroke();});
  requestAnimationFrame(animateRain);
}

/* ── PHOTOS ── */
function loadPhotos() {
  // Wall thumbnails (first 3)
  PHOTOS.slice(0,3).forEach((src,i) => {
    const wrap = document.getElementById('wall'+i);
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:1px';
    img.onerror = () => { wrap.innerHTML='<div class="placeholder-img" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,#2a1828,#3d2848)">✦</div>'; };
    wrap.innerHTML='';
    wrap.appendChild(img);
  });
}

/* ── GALLERY ── */
function buildGallery(){
  const grid=document.getElementById('galleryGrid');
  grid.innerHTML='';
  PHOTOS.forEach((src,i)=>{
    const item=document.createElement('div');item.className='gallery-item';
    const img=document.createElement('img');img.src=src;img.alt='foto '+(i+1);
    img.onerror=()=>{item.innerHTML='<div class="no-photo"><span>✦</span><span>foto'+(i+1)+'</span></div>';};
    item.appendChild(img);
    item.onclick=()=>openLightbox(src);
    grid.appendChild(item);
  });
}
function openLightbox(src){
  const lb=document.getElementById('lightbox');
  document.getElementById('lightboxImg').src=src;
  lb.style.display='flex';
}
function closeLightbox(){document.getElementById('lightbox').style.display='none';}

/* ── AUDIO PLAYER ── */
const audio=document.getElementById('audioPlayer');
let currentTrack=0,isPlaying=false;
audio.volume=0.7;

function buildTracklist(){
  const list=document.getElementById('tracklist');list.innerHTML='';
  if(!TRACKS.length){document.getElementById('trackName').textContent='–';document.getElementById('trackArtist').textContent='tambah lagu di MUSIC CONFIG';return;}
  TRACKS.forEach((t,i)=>{
    const el=document.createElement('div');el.className='track-item'+(i===0?' active':'');
    el.innerHTML=`<div class="track-dot"></div><span>${t.name}</span><span class="track-dur">${t.artist}</span>`;
    el.onclick=()=>selectTrack(i,true);
    list.appendChild(el);
  });
  loadTrack(0,false);
}

function loadTrack(i,autoplay){
  currentTrack=i;
  const t=TRACKS[i];
  document.getElementById('trackName').textContent=t.name;
  document.getElementById('trackArtist').textContent=t.artist;
  document.getElementById('laptopLabel').textContent='♪ '+t.name;
  document.querySelectorAll('.track-item').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.getElementById('progressFill').style.width='0%';
  audio.src=t.file;
  if(autoplay){audio.play().then(()=>{isPlaying=true;updatePlayBtn();}).catch(()=>showToast('gagal putar — cek folder music/'));}
}

function selectTrack(i,play){
  loadTrack(i,play!==false);
}

function togglePlay(){
  if(!TRACKS.length) return showToast('tambah lagu di MUSIC CONFIG dulu ya!');
  if(isPlaying){audio.pause();isPlaying=false;}
  else {audio.play().then(()=>{isPlaying=true;}).catch(()=>showToast('gagal putar — cek folder music/'));}
  updatePlayBtn();
}
function updatePlayBtn(){document.getElementById('playBtn').textContent=isPlaying?'⏸':'▶';}
function nextTrack(){selectTrack((currentTrack+1)%TRACKS.length,isPlaying);}
function prevTrack(){if(audio.currentTime>3){audio.currentTime=0;}else selectTrack((currentTrack-1+TRACKS.length)%TRACKS.length,isPlaying);}
function setVolume(v){audio.volume=v;}
function seekAudio(e){
  if(!audio.duration) return;
  const bar=document.getElementById('progressBar');
  const pct=(e.clientX-bar.getBoundingClientRect().left)/bar.offsetWidth;
  audio.currentTime=pct*audio.duration;
}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  document.getElementById('progressFill').style.width=(audio.currentTime/audio.duration*100)+'%';
});
audio.addEventListener('ended',()=>nextTrack());
audio.addEventListener('play',()=>{isPlaying=true;updatePlayBtn();});
audio.addEventListener('pause',()=>{isPlaying=false;updatePlayBtn();});

/* ── PLUSH MESSAGES ── */
const messages=[
  "you make the whole room feel warmer just by being in it.",
  "i keep a little piece of you with me, always.",
  "you deserve soft mornings and gentle days.",
  "staying up late just to think about you is kind of becoming my thing.",
  "the world is a little quieter and a lot better because of you.",
  "you're the kind of person I write playlists for.",
  "have I told you today that I'm really glad you exist?",
  "soft hours are always better when I'm thinking of you.",
  "you're my favorite kind of magic — the really quiet, real kind.",
  "your laugh could literally fix a whole bad week. just saying."
];
let msgIdx=Math.floor(Math.random()*messages.length);
function nextMessage(){msgIdx=(msgIdx+1)%messages.length;document.getElementById('plushMessage').textContent=messages[msgIdx];}

/* ── MODALS ── */
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

/* ── TOAST ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

/* ── TOOLTIP ── */
const tip=document.getElementById('tooltip');
document.querySelectorAll('[data-tip]').forEach(el=>{
  el.addEventListener('mouseenter',()=>{tip.textContent=el.dataset.tip;tip.style.opacity='1';});
  el.addEventListener('mousemove',e=>{tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-28)+'px';});
  el.addEventListener('mouseleave',()=>{tip.style.opacity='0';});
});

/* ── EVENTS ── */
function attachEvents(){
  document.getElementById('windowEl').addEventListener('click',()=>{weatherIdx=(weatherIdx+1)%weatherStates.length;drawWindow();showToast('weather: '+weatherStates[weatherIdx]);});
  document.getElementById('photosEl').addEventListener('click',()=>openModal('galleryModal'));
  document.getElementById('laptopEl').addEventListener('click',()=>openModal('musicModal'));
  document.getElementById('lampEl').addEventListener('click',()=>{document.documentElement.classList.toggle('lights-off');showToast(document.documentElement.classList.contains('lights-off')?'lights off…':'lights on ✦');});
  document.getElementById('plushEl').addEventListener('click',()=>{document.getElementById('plushMessage').textContent=messages[msgIdx];openModal('plushModal');});
  document.getElementById('easterEgg').addEventListener('click',()=>openModal('easterModal'));
}
</script>
